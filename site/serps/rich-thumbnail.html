<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approach/Retreat — Rich thumbnail</title>
  <link rel="stylesheet" href="../css/serp.css">
  <script src="../js/posthog-init.js"></script>
</head>
<body class="layout-rich-thumbnail">
  <div class="page">
    <div class="question-switcher"></div>
    <header class="serp-header">
      <div class="serp-query"></div>
      <div class="serp-info"></div>
    </header>
    <div class="serp-results" id="serp"></div>

    <div class="ar-debug">
      <div>Episodes: <span id="debug-episodes">0</span></div>
      <div>Retreats: <span id="debug-retreats">0</span></div>
      <div>Classification:</div>
      <div id="debug-classes" style="font-size: 0.7rem;"></div>
    </div>

    <footer class="site-footer">
      <p>Cursor captured anonymously. <a href="https://github.com/andyed/approach-retreat">Source &amp; method</a>. Press <kbd>d</kbd> for debug.</p>
    </footer>
  </div>

  <script type="module">
    import {
      loadQuestion, initApproachRetreat, wireDebugOverlay,
      renderHeader, renderAnswers,
    } from '../js/ar-init.js';
    import {
      getActiveRun, recordMission, summarizeMission,
      MISSION_LABELS, MISSION_INSTRUCTIONS,
    } from '../missions/run-state.js';

    const LAYOUT = 'rich-thumbnail';
    const url = new URL(window.location.href);
    const isRunMode = url.searchParams.get('mode') === 'run';

    const { meta, answers, index } = await loadQuestion();

    if (isRunMode) {
      document.body.classList.add('mission-run-mode');
      // Hide the question switcher so the dogfooder stays on-mission
      const sw = document.querySelector('.question-switcher');
      if (sw) sw.style.display = 'none';
    }

    renderHeader({ meta, index, layoutName: LAYOUT });

    // In run mode, replace the layout-list link in the info row with a
    // mission breadcrumb + cancel link.
    if (isRunMode) {
      const infoEl = document.querySelector('.serp-info');
      const run = getActiveRun();
      const label = MISSION_LABELS[meta.id] || meta.title;
      const idx = run ? run.mission_order.indexOf(meta.id) + 1 : null;
      const total = run ? run.mission_order.length : null;
      const breadcrumb =
        idx && total
          ? `Mission ${idx} of ${total} — ${label}`
          : `Mission — ${label}`;
      if (infoEl) {
        infoEl.innerHTML =
          `${breadcrumb} &middot; <em>${MISSION_INSTRUCTIONS[meta.id] || 'Pick the one you would actually watch.'}</em> &middot; ` +
          `<a href="../missions/index.html">Cancel mission</a>`;
      }
    }

    renderAnswers(document.getElementById('serp'), answers, { variant: 'rich-thumbnail' });

    let debugUpdate = () => {};
    let arRef = null;
    const handleRunClick = (clickInfo) => {
      const run = getActiveRun();
      if (!run) {
        window.location.href = '../missions/index.html';
        return;
      }
      // Finalize active/retreating episodes so signals/classify include them.
      arRef.flush();
      const signals = arRef.getSignals();
      const classification = arRef.classify();
      const episodes = arRef.getEpisodes();
      const summary = summarizeMission(answers, signals, clickInfo.position);
      recordMission(run.run_id, meta.id, {
        ...summary,
        // Forensic data — preserved for the v2 user-override step on prompt.html
        ar: { classification, signals, clicked_position: clickInfo.position },
        episodes,
      });
      // Soft-redirect — let any pending capture flush first.
      setTimeout(() => {
        window.location.href = `../missions/done.html?m=${encodeURIComponent(meta.id)}`;
      }, 50);
    };

    const onClick = isRunMode
      ? handleRunClick
      : ({ target }) => target.classList.toggle('expanded');

    const { ar } = initApproachRetreat({
      layoutName: LAYOUT,
      queryMeta: meta,
      onClick,
      onEpisode: () => debugUpdate(),
    });
    arRef = ar;
    debugUpdate = wireDebugOverlay(ar);
    ar.refresh();
  </script>
</body>
</html>
