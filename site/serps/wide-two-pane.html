<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approach/Retreat — Wide two-pane</title>
  <link rel="stylesheet" href="../css/serp.css">
  <script src="../js/posthog-init.js"></script>
</head>
<body class="layout-two-pane">
  <div class="page">
    <div class="question-switcher"></div>
    <header class="serp-header">
      <div class="serp-query"></div>
      <div class="serp-info"></div>
    </header>
    <div class="serp-body">
      <div class="serp-results" id="serp"></div>
      <aside class="reading-pane" id="reading">
        <p class="placeholder">Select an answer on the left to read.</p>
      </aside>
    </div>

    <div class="ar-debug">
      <div>Episodes: <span id="debug-episodes">0</span></div>
      <div>Retreats: <span id="debug-retreats">0</span></div>
      <div>Classification:</div>
      <div id="debug-classes" style="font-size: 0.7rem;"></div>
    </div>

    <footer class="site-footer">
      <p>Cursor captured anonymously. <a href="https://github.com/andyed/approach-retreat">Source &amp; method</a>. Press <kbd>d</kbd> for debug.</p>
    </footer>
  </div>

  <script type="module">
    import {
      loadQuestion, initApproachRetreat, wireDebugOverlay,
      renderHeader, renderAnswers, renderReadingPane,
    } from '../js/ar-init.js';

    const LAYOUT = 'wide-two-pane';
    const { meta, answers, index } = await loadQuestion();
    renderHeader({ meta, index, layoutName: LAYOUT });
    renderAnswers(document.getElementById('serp'), answers, { variant: 'two-pane' });

    const readingPane = document.getElementById('reading');

    let debugUpdate = () => {};
    const { ar } = initApproachRetreat({
      layoutName: LAYOUT,
      queryMeta: meta,
      onClick: ({ position, target }) => {
        document.querySelectorAll('.result.selected').forEach((el) =>
          el.classList.remove('selected')
        );
        target.classList.add('selected');
        const answer = answers.find((a) => a.position === position);
        renderReadingPane(readingPane, answer);
      },
      onEpisode: () => debugUpdate(),
    });
    debugUpdate = wireDebugOverlay(ar);
    ar.refresh();
  </script>
</body>
</html>
