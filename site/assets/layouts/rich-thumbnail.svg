<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="title desc">
  <title id="title">Rich thumbnail card list</title>
  <desc id="desc">Image-left, text-right layout. Heterogeneous content inside each AOI (thumbnail plus title plus snippet). YouTube search style.</desc>

  <!-- Canvas -->
  <rect x="0.75" y="0.75" width="478.5" height="358.5" rx="10" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- 4 rich rows. Row 72 tall, gap 10. Start y=26. -->
  <g transform="translate(32, 26)">
    <!-- row 1 -->
    <g>
      <!-- thumbnail -->
      <rect x="0" y="0" width="118" height="66" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
      <!-- stylized picture: sun + mountains -->
      <circle cx="30" cy="24" r="6" fill="#6ea8fe"/>
      <polygon points="10,60 40,28 62,50 88,22 108,60" fill="#2a2a2a" stroke="#909090" stroke-width="1"/>
      <!-- text block -->
      <rect x="134" y="2"  width="280" height="11" rx="2" fill="#6ea8fe"/>
      <rect x="134" y="20" width="150" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="32" width="280" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="40" width="260" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="48" width="180" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="60" width="110" height="3"  rx="1" fill="#909090"/>
    </g>
    <!-- row 2 -->
    <g transform="translate(0,82)">
      <rect x="0" y="0" width="118" height="66" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
      <circle cx="88" cy="22" r="5" fill="#6ea8fe"/>
      <polygon points="10,60 30,34 56,52 82,30 108,60" fill="#2a2a2a" stroke="#909090" stroke-width="1"/>
      <rect x="134" y="2"  width="240" height="11" rx="2" fill="#6ea8fe"/>
      <rect x="134" y="20" width="140" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="32" width="280" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="40" width="250" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="48" width="200" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="60" width="120" height="3"  rx="1" fill="#909090"/>
    </g>
    <!-- row 3 -->
    <g transform="translate(0,164)">
      <rect x="0" y="0" width="118" height="66" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
      <circle cx="30" cy="20" r="6" fill="#6ea8fe"/>
      <polygon points="10,60 40,30 58,48 86,24 108,60" fill="#2a2a2a" stroke="#909090" stroke-width="1"/>
      <rect x="134" y="2"  width="300" height="11" rx="2" fill="#6ea8fe"/>
      <rect x="134" y="20" width="160" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="32" width="280" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="40" width="220" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="48" width="280" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="60" width="100" height="3"  rx="1" fill="#909090"/>
    </g>
    <!-- row 4 -->
    <g transform="translate(0,246)">
      <rect x="0" y="0" width="118" height="66" rx="4" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
      <circle cx="92" cy="24" r="5" fill="#6ea8fe"/>
      <polygon points="10,60 36,32 60,52 82,26 108,60" fill="#2a2a2a" stroke="#909090" stroke-width="1"/>
      <rect x="134" y="2"  width="260" height="11" rx="2" fill="#6ea8fe"/>
      <rect x="134" y="20" width="145" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="32" width="280" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="40" width="230" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="48" width="270" height="3"  rx="1" fill="#909090"/>
      <rect x="134" y="60" width="115" height="3"  rx="1" fill="#909090"/>
    </g>
  </g>
</svg>
