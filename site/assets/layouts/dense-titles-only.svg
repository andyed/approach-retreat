<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="title desc">
  <title id="title">Dense titles-only list</title>
  <desc id="desc">Hacker News style dense list. Titles plus meta, no snippet. Small AOIs, tight row spacing, fast-scan cursor behavior.</desc>

  <!-- Canvas -->
  <rect x="0.75" y="0.75" width="478.5" height="358.5" rx="10" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- 13 rows, compact. Row height 20, gap 4. Start y=28. -->
  <g transform="translate(40, 28)">
    <!-- row 1 -->
    <g>
      <rect x="0"   y="3" width="14"  height="5" rx="1" fill="#909090"/>
      <rect x="22"  y="0" width="280" height="10" rx="2" fill="#6ea8fe"/>
      <rect x="22"  y="14" width="120" height="3" rx="1" fill="#909090"/>
    </g>
    <!-- row 2 -->
    <g transform="translate(0,24)">
      <rect x="0"   y="3" width="14"  height="5" rx="1" fill="#909090"/>
      <rect x="22"  y="0" width="340" height="10" rx="2" fill="#6ea8fe"/>
      <rect x="22"  y="14" width="100" height="3" rx="1" fill="#909090"/>
    </g>
    <!-- row 3 -->
    <g transform="translate(0,48)">
      <rect x="0"   y="3" width="14"  height="5" rx="1" fill="#909090"/>
      <rect x="22"  y="0" width="260" height="10" rx="2" fill="#6ea8fe"/>
      <rect x="22"  y="14" width="140" height="3" rx="1" fill="#909090"/>
    </g>
    <!-- row 4 -->
