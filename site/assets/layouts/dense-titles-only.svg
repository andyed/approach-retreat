      <rect x="22"  y="0" width="370" height="10" rx="2" fill="#6ea8fe"/>
      <rect x="22"  y="14" width="90"  height="3" rx="1" fill="#909090"/>
    </g>
    <!-- row 6 -->
    <g transform="translate(0,120)">
      <rect x="0"   y="3" width="14"  height="5" rx="1" fill="#909090"/>
      <rect x="22"  y="0" width="240" height="10" rx="2" fill="#6ea8fe"/>
      <rect x="22"  y="14" width="130" height="3" rx="1" fill="#909090"/>
