<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="title desc">
  <title id="title">Wide two-pane list + reading view</title>
  <desc id="desc">Left pane is a condensed list of ranked results; right pane is the currently-focused reading view. Gmail, Feedly, Outlook idiom.</desc>

  <!-- Canvas -->
  <rect x="0.75" y="0.75" width="478.5" height="358.5" rx="10" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Pane divider -->
  <line x1="190" y1="22" x2="190" y2="338" stroke="#2a2a2a" stroke-width="1"/>

  <!-- LEFT PANE: condensed list (8 rows) -->
  <g transform="translate(22, 28)">
    <!-- row template: title bar 9h, 1 meta line 3h below -->
    <g>
      <rect x="0" y="0" width="150" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="90" height="3" rx="1" fill="#909090"/>
    </g>
    <g transform="translate(0,30)">
      <rect x="0" y="0" width="130" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="100" height="3" rx="1" fill="#909090"/>
    </g>
    <!-- selected row -->
    <g transform="translate(-8,60)">
      <rect x="0" y="-4" width="168" height="30" rx="4" fill="#141414" stroke="#6ea8fe" stroke-width="1"/>
      <rect x="8" y="4" width="140" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="8" y="18" width="100" height="3" rx="1" fill="#e8e8e8"/>
    </g>
    <g transform="translate(0,96)">
      <rect x="0" y="0" width="140" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="110" height="3" rx="1" fill="#909090"/>
    </g>
    <g transform="translate(0,126)">
      <rect x="0" y="0" width="150" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="80" height="3" rx="1" fill="#909090"/>
    </g>
    <g transform="translate(0,156)">
      <rect x="0" y="0" width="120" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="95" height="3" rx="1" fill="#909090"/>
    </g>
    <g transform="translate(0,186)">
      <rect x="0" y="0" width="160" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="85" height="3" rx="1" fill="#909090"/>
    </g>
    <g transform="translate(0,216)">
      <rect x="0" y="0" width="130" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="100" height="3" rx="1" fill="#909090"/>
    </g>
    <g transform="translate(0,246)">
      <rect x="0" y="0" width="145" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="90" height="3" rx="1" fill="#909090"/>
    </g>
    <g transform="translate(0,276)">
      <rect x="0" y="0" width="115" height="8" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="14" width="75" height="3" rx="1" fill="#909090"/>
    </g>
  </g>

  <!-- RIGHT PANE: reading view -->
  <g transform="translate(210, 32)">
    <!-- headline -->
    <rect x="0" y="0" width="210" height="12" rx="2" fill="#e8e8e8"/>
    <rect x="0" y="18" width="160" height="4" rx="1" fill="#909090"/>
    <!-- author meta -->
    <rect x="0" y="34" width="140" height="3" rx="1" fill="#6ea8fe"/>
    <!-- body paragraphs -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0"   width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="10"  width="248" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="20"  width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="30"  width="180" height="3" rx="1" fill="#909090"/>

      <rect x="0" y="48"  width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="58"  width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="68"  width="220" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="78"  width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="88"  width="150" height="3" rx="1" fill="#909090"/>

      <rect x="0" y="106" width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="116" width="240" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="126" width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="136" width="130" height="3" rx="1" fill="#909090"/>

      <rect x="0" y="154" width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="164" width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="174" width="210" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="184" width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="194" width="170" height="3" rx="1" fill="#909090"/>

      <rect x="0" y="212" width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="222" width="200" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="232" width="250" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="242" width="110" height="3" rx="1" fill="#909090"/>
    </g>
  </g>
</svg>
