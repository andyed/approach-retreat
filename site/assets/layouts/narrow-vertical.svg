<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="title desc">
  <title id="title">Narrow vertical list</title>
  <desc id="desc">Single-column list of ranked results stacked top to bottom. Google and Quora style. 720px max-width text column.</desc>

  <!-- Canvas -->
  <rect x="0.75" y="0.75" width="478.5" height="358.5" rx="10" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- 5 stacked result cards, centered column -->
  <g transform="translate(90, 24)">
    <!-- 1 -->
    <g>
      <rect x="0" y="0"  width="260" height="9" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="16" width="140" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="26" width="300" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="34" width="240" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="46" width="100" height="3" rx="1" fill="#909090"/>
      <line x1="0" y1="58" x2="300" y2="58" stroke="#2a2a2a" stroke-width="1"/>
    </g>
    <!-- 2 -->
    <g transform="translate(0, 66)">
      <rect x="0" y="0"  width="230" height="9" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="16" width="130" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="26" width="300" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="34" width="210" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="46" width="120" height="3" rx="1" fill="#909090"/>
      <line x1="0" y1="58" x2="300" y2="58" stroke="#2a2a2a" stroke-width="1"/>
    </g>
    <!-- 3 -->
    <g transform="translate(0, 132)">
      <rect x="0" y="0"  width="280" height="9" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="16" width="150" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="26" width="300" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="34" width="270" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="46" width="90"  height="3" rx="1" fill="#909090"/>
      <line x1="0" y1="58" x2="300" y2="58" stroke="#2a2a2a" stroke-width="1"/>
    </g>
    <!-- 4 -->
    <g transform="translate(0, 198)">
      <rect x="0" y="0"  width="200" height="9" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="16" width="120" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="26" width="300" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="34" width="230" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="46" width="110" height="3" rx="1" fill="#909090"/>
      <line x1="0" y1="58" x2="300" y2="58" stroke="#2a2a2a" stroke-width="1"/>
    </g>
    <!-- 5 -->
    <g transform="translate(0, 264)">
      <rect x="0" y="0"  width="250" height="9" rx="2" fill="#6ea8fe"/>
      <rect x="0" y="16" width="140" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="26" width="300" height="3" rx="1" fill="#909090"/>
      <rect x="0" y="34" width="220" height="3" rx="1" fill="#909090"/>
    </g>
  </g>
</svg>
